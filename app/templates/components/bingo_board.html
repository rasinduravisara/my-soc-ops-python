<div class="grid grid-cols-5 gap-1 w-full max-w-md mx-auto aspect-square">
    {% for square in session.board %}
    {% set is_winning = square.id in session.winning_square_ids %}
    <button
        {% if not square.is_free_space %}
        hx-post="/toggle/{{ square.id }}"
        hx-target="#game-container"
        hx-swap="outerHTML"
        {% endif %}
        {% if square.is_free_space %}disabled{% endif %}
        class="relative flex items-center justify-center p-1 text-center retro-square select-none min-h-[60px]"
        aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
        aria-label="{{ 'Free space' if square.is_free_space else square.text }}"
        {% if square.is_marked %}
            {% if is_winning %} style="background:#00fff7;color:#1a0033;border-color:#ff00cc;box-shadow:0 0 24px #ff00cc;"
            {% else %} style="background:#ff00cc;color:#fffbe7;border-color:#fffbe7;box-shadow:0 0 16px #00fff7;"
            {% endif %}
        {% endif %}
        {% if square.is_free_space %} style="font-weight:bold;font-size:1.2rem;"{% endif %}
    >
        <span class="wrap-break-word hyphens-auto">{{ square.text }}</span>
        {% if square.is_marked and not square.is_free_space %}
        <span class="absolute top-0.5 right-0.5" style="color:#00fff7;font-size:1.2em;">★</span>
        {% endif %}
    </button>
    {% endfor %}
</div>
