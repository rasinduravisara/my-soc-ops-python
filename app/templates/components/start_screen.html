<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6 bg-gray-50">
    <div class="text-center max-w-sm">
        <h1 class="retro-title">Soc Ops</h1>
        <p class="retro-subtitle">Retro Social Bingo</p>

        <div class="retro-board mb-8">
            <h2 class="font-semibold mb-3" style="color:#ff00cc;text-shadow:0 0 4px #00fff7;">How to play</h2>
            <ul class="text-left" style="color:#fffbe7;font-family:'VT323',monospace;font-size:1.1rem;">
                <li>• Find people who match the prompts</li>
                <li>• Tap a square when you find a match</li>
                <li>• Get 5 in a row to win!</li>
            </ul>
        </div>

        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="retro-btn w-full">
            Start Game
        </button>
    </div>
</div>
</div>
